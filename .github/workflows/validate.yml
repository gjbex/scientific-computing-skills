name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate plugin manifest
        run: python3 tools/validate_plugin.py .

      - name: Validate skills
        run: python3 tools/validate_skills.py skills

      - name: Compile bundled Python scripts
        run: python3 -m py_compile skills/scientific-cli-benchmark/scripts/simple_benchmark.py
